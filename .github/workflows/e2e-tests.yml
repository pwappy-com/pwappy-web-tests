# ワークフローの名称
name: Multi-OS E2E Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  # 同じワークフロー名（Multi-OS E2E Tests）でグループ化
  group: ${{ github.workflow }}-${{ github.ref }}
  # 実行中のジョブをキャンセルせず、順番待ちをさせる
  cancel-in-progress: false

# ワークフローが実行されるトリガーを定義
on:
  # 定期実行 (schedule)
  schedule:
    # UTCの3時間毎に実行。JST 10時, 13時, 16時, 19時, 22時, 翌5時, 8時に実行 (Normalテスト用)
    - cron: "0 1,4,7,10,13,20,23 * * *"
    # UTCの毎日0時0分 (JST 9時) に実行 (Premiumテスト用) GeminiAPIキーの有料化に伴い一時停止
    - cron: "0 0 * * *"
  # 手動実行 (workflow_dispatch)
  workflow_dispatch:
    inputs:
      # 手動実行時に実行するテストスイートを選択するドロップダウン
      test_suite:
        description: "実行するテストスイートを選択"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - premium
          - all
      # 手動実行時に実行するOSを選択するドロップダウン
      os:
        description: "実行するOSを選択"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ubuntu-latest
          - windows-latest
          - macos-latest
      # 手動実行時のワーカー数を指定
      workers:
        description: "実行ワーカー数 (手動用)"
        required: true
        default: "75%"
        type: string

# ワークフローを構成するジョブを定義
jobs:
  # ===================================================================
  # ジョブ 1: 実行するテストのマトリックスとフラグを動的に準備する
  # ===================================================================
  prepare-matrix:
    runs-on: ubuntu-latest
    # このジョブの出力を定義。後続のジョブの条件分岐やマトリックスとして使用。
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_normal: ${{ steps.get_suite.outputs.run_normal }}
      run_premium: ${{ steps.get_suite.outputs.run_premium }}
    steps:
      - name: Determine test matrix
        id: set-matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # 毎日0時のスケジュール（Premiumテスト用）の場合は全OSを実行
            if [[ "${{ github.event.schedule }}" == "0 0 * * *" ]]; then
              echo "matrix<<EOF" >> $GITHUB_OUTPUT
              echo '[
                {"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"},
                {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"},
                {"os": "windows-latest", "browser": "chromium", "binary": "chromium"},
                {"os": "macos-latest", "browser": "webkit", "binary": "webkit"},
                {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}
              ]' >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              # 3時間毎の定期実行（UTC 1, 4, 7, 10, 13, 20, 23）
              # 現在のUTC時間を取得し、8進数解釈エラーを防ぐため10進数に変換
              H=$(date -u +"%H")
              H=$((10#$H))

              # 実行時間（遅延も考慮した範囲）に応じてローテーション対象を1つ決定
              # UTC 1, 10, 23時付近 -> Windows
              # UTC 4, 13時付近   -> Safari (macOS WebKit)
              # UTC 7, 20時付近   -> MobileSafari
              if (( (H >= 23 || H <= 2) || (H >= 10 && H <= 11) )); then
                ROTATION_TARGET='{"os": "windows-latest", "browser": "chromium", "binary": "chromium"}'
              elif (( (H >= 4 && H <= 5) || (H >= 13 && H <= 14) )); then
                ROTATION_TARGET='{"os": "macos-latest", "browser": "webkit", "binary": "webkit"}'
              elif (( (H >= 7 && H <= 8) || (H >= 20 && H <= 21) )); then
                ROTATION_TARGET='{"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}'
              else
                # 判定から外れた場合のフォールバック
                ROTATION_TARGET='{"os": "windows-latest", "browser": "chromium", "binary": "chromium"}'
              fi

              # Ubuntuの2環境に、選択されたローテーション対象を加えてマトリックスを出力
              echo "matrix<<EOF" >> $GITHUB_OUTPUT
              echo "[
                {\"os\": \"ubuntu-latest\", \"browser\": \"chromium\", \"binary\": \"chromium\"},
                {\"os\": \"ubuntu-latest\", \"browser\": \"mobile-chrome\", \"binary\": \"chromium\"},
                $ROTATION_TARGET
              ]" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event.inputs.os }}" == "all" ]]; then
            # 手動実行で「all」が選ばれた場合は、全てのOS/ブラウザを実行
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo '[
              {"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"},
              {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"},
              {"os": "windows-latest", "browser": "chromium", "binary": "chromium"},
              {"os": "macos-latest", "browser": "webkit", "binary": "webkit"},
              {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}
            ]' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # 手動実行で特定のOSが選択された場合は、そのOSに対応する組み合わせのみを生成する
            case "${{ github.event.inputs.os }}" in
              "ubuntu-latest")
                echo "matrix<<EOF" >> $GITHUB_OUTPUT
                echo '[
                  {"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"},
                  {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"}
                ]' >> $GITHUB_OUTPUT
                echo "EOF" >> $GITHUB_OUTPUT
                ;;
              "windows-latest")
                echo 'matrix=[{"os": "windows-latest", "browser": "chromium", "binary": "chromium"}]' >> $GITHUB_OUTPUT
                ;;
              "macos-latest")
                echo "matrix<<EOF" >> $GITHUB_OUTPUT
                echo '[
                  {"os": "macos-latest", "browser": "webkit", "binary": "webkit"},
                  {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}
                ]' >> $GITHUB_OUTPUT
                echo "EOF" >> $GITHUB_OUTPUT
                ;;
            esac
          fi

      - name: Determine Test Suite Flags
        id: get_suite
        shell: bash
        run: |
          # 実行すべきスイート（Normal/Premium）をフラグとして出力
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ "${{ github.event.schedule }}" == "0 0 * * *" ]; then
              echo "run_premium=true" >> $GITHUB_OUTPUT
            else
              echo "run_normal=true" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SUITE="${{ github.event.inputs.test_suite }}"
            if [ "$SUITE" == "normal" ] || [ "$SUITE" == "all" ]; then echo "run_normal=true" >> $GITHUB_OUTPUT; fi
            if [ "$SUITE" == "premium" ] || [ "$SUITE" == "all" ]; then echo "run_premium=true" >> $GITHUB_OUTPUT; fi
          fi

  # ===================================================================
  # ジョブ 2: Normalテストの実行
  # ===================================================================
  e2e-normal:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.run_normal == 'true' }}
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      # 最大並列数をPC(Linux,Windows,Mac),Mobile(Android,iOS)の５つ
      max-parallel: 5
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # キャッシュキー接頭辞の設定 (バイナリエンジン単位でキャッシュを共有)
      - name: Set cache key prefix
        run: |
          echo "CACHE_KEY_PREFIX=${{ runner.os }}-playwright-${{ matrix.binary }}-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Ubuntuランナーには日本語フォントがないためインストール (文字化け/トーフ対策)
      # フォントのキャッシュ確認
      - name: Cache Japanese fonts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: ~/.fonts
          key: ${{ runner.os }}-fonts-noto-cjk-v1

      # キャッシュがない場合のみインストールしてユーザーディレクトリにコピー
      - name: Install Japanese fonts (Ubuntu only)
        if:
          matrix.os == 'ubuntu-latest' && steps.cache-fonts.outputs.cache-hit !=
          'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.fonts
          cp -r /usr/share/fonts/opentype/noto ~/.fonts/

      # 復元した(または新規コピーした)フォントをシステムに認識させる
      - name: Refresh font cache (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: fc-cache -fv

      # 日本時間（JST）で日付を取得するように修正
      - name: Get daily cache key suffix
        id: get-date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      # キャッシュから復元された不要なロックファイルを事前に強制削除してハングを防ぐ
      - name: Remove stale Playwright locks
        shell: bash
        run: |
          if [ -d "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" ]; then
            echo "Checking for stale locks in ${{ env.PLAYWRIGHT_BROWSERS_PATH }}..."
            rm -rf "${{ env.PLAYWRIGHT_BROWSERS_PATH }}/__dirlock"
            find "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" -name "__dirlock" -exec rm -rf {} + || true
          fi

      # システム依存関係のインストール (プロンプト停止防止)
      - name: Install Playwright system dependencies
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install-deps ${{ matrix.binary }}
        env:
          DEBIAN_FRONTEND: noninteractive

      # 指定されたバイナリをインストール
      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.binary }}
        env:
          DEBUG: pw:*

      - name: Set OS Short Name
        shell: bash
        run: |
          OS_NAME="${{ matrix.os }}"
          if [[ "$OS_NAME" == "ubuntu-latest" ]];then echo "OS_SHORT_NAME=ubuntu" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "windows-latest" ]]; then echo "OS_SHORT_NAME=win" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "macos-latest" ]]; then echo "OS_SHORT_NAME=macos" >> $GITHUB_ENV;
          else echo "OS_SHORT_NAME=unknown" >> $GITHUB_ENV; fi

      # プロジェクト名を指定してテスト実行
      - name: Run Normal E2E Tests
        id: run_tests
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            WORKERS="75%"
          else
            # 手動実行時は入力パラメータから取得し、空の場合はデフォルト 2
            WORKERS="${{ github.event.inputs.workers }}"
            WORKERS="${WORKERS:-2}"
          fi

          echo "Running tests with workers: $WORKERS"
          npx playwright test tests/specs/normal --project=${{ matrix.browser }} --reporter=line --workers=$WORKERS
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        env:
          TEST_RUN_SUFFIX: ${{ env.OS_SHORT_NAME }}
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_TEST_USER_PREFIX: "pwusr"
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト失敗またはタイムアウト（キャンセル）時：このブラウザエンジン/OSに関連する「全ての古いキャッシュ」を削除する
      - name: Delete cache on failure or cancellation
        if: failure() || cancelled()
        run: |
          echo "Test failed or was cancelled. Clearing all related caches for ${{ env.CACHE_KEY_PREFIX }}..."
          # 一致する接頭辞を持つキャッシュをリストアップして全て削除
          gh cache list --key "${{ env.CACHE_KEY_PREFIX }}-" --json key --jq '.[].key' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name:
            playwright-report-normal-${{ matrix.os }}-${{ matrix.browser }}-${{
            github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark Job Failure
        if: steps.run_tests.outputs.EXIT_CODE != '0'
        run: exit 1

  # ===================================================================
  # ジョブ 3: Premiumテストの実行
  # ===================================================================
  e2e-premium:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.run_premium == 'true' }}
    timeout-minutes: 120
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      # ポイント消費の重複や競合を防ぐため、OS間でも1つずつ順番に実行する。
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set cache key prefix
        run: |
          echo "CACHE_KEY_PREFIX=${{ runner.os }}-playwright-${{ matrix.binary }}-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Ubuntuランナーには日本語フォントがないためインストール (文字化け/トーフ対策)
      - name: Cache Japanese fonts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: ~/.fonts
          key: ${{ runner.os }}-fonts-noto-cjk-v1

      - name: Install Japanese fonts (Ubuntu only)
        if:
          matrix.os == 'ubuntu-latest' && steps.cache-fonts.outputs.cache-hit !=
          'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.fonts
          cp -r /usr/share/fonts/opentype/noto ~/.fonts/

      - name: Refresh font cache (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: fc-cache -fv

      - name: Get daily cache key suffix
        id: get-date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      # キャッシュから復元された不要なロックファイルを事前に強制削除してハングを防ぐ
      - name: Remove stale Playwright locks
        shell: bash
        run: |
          if [ -d "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" ]; then
            echo "Checking for stale locks in ${{ env.PLAYWRIGHT_BROWSERS_PATH }}..."
            rm -rf "${{ env.PLAYWRIGHT_BROWSERS_PATH }}/__dirlock"
            find "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" -name "__dirlock" -exec rm -rf {} + || true
          fi

      - name: Install Playwright system dependencies
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install-deps ${{ matrix.binary }}
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.binary }}
        env:
          DEBUG: pw:*

      - name: Set OS Short Name
        shell: bash
        run: |
          OS_NAME="${{ matrix.os }}"
          if [[ "$OS_NAME" == "ubuntu-latest" ]]; then echo "OS_SHORT_NAME=ubuntu" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "windows-latest" ]]; then echo "OS_SHORT_NAME=win" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "macos-latest" ]]; then echo "OS_SHORT_NAME=macos" >> $GITHUB_ENV;
          else echo "OS_SHORT_NAME=unknown" >> $GITHUB_ENV; fi

      - name: Run Premium E2E Tests
        id: run_tests
        shell: bash
        # 最も安定した直列実行(1ワーカー)で実行。
        run: |
          npx playwright test tests/specs/premium --project=${{ matrix.browser }} --reporter=line --workers=1
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        env:
          TEST_RUN_SUFFIX: ${{ env.OS_SHORT_NAME }}
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_TEST_USER_PREFIX: "pwusr"
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト失敗またはタイムアウト（キャンセル）時：このブラウザエンジン/OSに関連する「全ての古いキャッシュ」を削除する
      - name: Delete cache on failure or cancellation
        if: failure() || cancelled()
        run: |
          echo "Test failed or was cancelled. Clearing all related caches for ${{ env.CACHE_KEY_PREFIX }}..."
          gh cache list --key "${{ env.CACHE_KEY_PREFIX }}-" --json key --jq '.[].key' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name:
            playwright-report-premium-${{ matrix.os }}-${{ matrix.browser }}-${{
            github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark Job Failure
        if: steps.run_tests.outputs.EXIT_CODE != '0'
        run: exit 1

  # ===================================================================
  # ジョブ 4: クリーンアップ (全テスト完了後に実行)
  # ===================================================================
  cleanup:
    # NormalまたはPremiumいずれかの実行が終わった後、常に呼び出す。
    needs: [e2e-normal, e2e-premium]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Checkout repository for cleanup
        uses: actions/checkout@v6

      - name: Set cache key prefix for cleanup
        run: |
          echo "CACHE_KEY_PREFIX=${{ runner.os }}-playwright-chromium-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_ENV

      - name: Setup Node.js for cleanup
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies for cleanup
        run: npm install

      - name: Get daily cache key suffix
        id: get-date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Playwright browsers for cleanup
        id: cache-playwright-browsers-cleanup
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      # キャッシュから不要なロックファイルを事前に強制削除してハングを防ぐ
      - name: Remove stale Playwright locks for cleanup
        shell: bash
        run: |
          if [ -d "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" ]; then
            echo "Checking for stale locks in ${{ env.PLAYWRIGHT_BROWSERS_PATH }}..."
            rm -rf "${{ env.PLAYWRIGHT_BROWSERS_PATH }}/__dirlock"
            find "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" -name "__dirlock" -exec rm -rf {} + || true
          fi

      - name: Install Playwright system dependencies for cleanup
        if: steps.cache-playwright-browsers-cleanup.outputs.cache-hit != 'true'
        run: npx playwright install-deps chromium
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Playwright Browsers for cleanup
        if: steps.cache-playwright-browsers-cleanup.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        env:
          DEBUG: pw:*

      # 既存のクリーンアップスクリプトを、全アカウント候補（OS × ブラウザ × ワーカー）に対してループ実行します
      - name: Run Cleanup Script for All Test Accounts
        shell: bash
        run: |
          # テストで使われうるすべての「OSコード」「ブラウザコード」「ワーカー番号」
          OS_LIST="ubuntu win macos local"
          BROWSER_LIST="c f s a i"
          WORKER_LIST="0 1"

          for os in $OS_LIST; do
            for browser in $BROWSER_LIST; do
              for worker in $WORKER_LIST; do
                
                # 環境変数のセット
                export TEST_WORKER_INDEX="$worker"
                export PWAPPY_TEST_CLEANUP_BROWSER_CODE="$browser"
                
                if [ "$os" = "ubuntu" ]; then
                  export TEST_RUN_SUFFIX="ubuntu"
                elif [ "$os" = "win" ]; then
                  export TEST_RUN_SUFFIX="win"
                elif [ "$os" = "macos" ]; then
                  export TEST_RUN_SUFFIX="macos"
                else
                  export TEST_RUN_SUFFIX="local"
                fi

                # 対応する認証ファイルのパスを取得
                # .auth/user-[os]-[browser]-[worker].json
                # ※ constants.ts の仕様上、 getOsCode() が TEST_RUN_SUFFIX から 'u' 'w' 'm' 'l' を抽出します
                OS_CODE_CHAR="l"
                if [ "$os" = "ubuntu" ]; then OS_CODE_CHAR="u"; fi
                if [ "$os" = "win" ]; then OS_CODE_CHAR="w"; fi
                if [ "$os" = "macos" ]; then OS_CODE_CHAR="m"; fi
                
                SESSION_FILE=".auth/user-${OS_CODE_CHAR}-${browser}-${worker}.json"

                # 実際にテストで使われた形跡（中身が空でないセッションファイル）がある場合のみ、既存スクリプトを実行
                if [ -f "$SESSION_FILE" ] && [ "$(cat "$SESSION_FILE" | tr -d ' ')" != "{}" ]; then
                  echo "=== Cleaning up account: OS[$os] Browser[$browser] Worker[$worker] (File: $SESSION_FILE) ==="
                  
                  # 既存の削除スクリプト（a0-cleanup-all-apps.spec.ts）を、何一つコードを変更せずにそのまま呼び出し
                  npx playwright test tests/tools/a0-cleanup-all-apps.spec.ts --project=chromium
                fi
              done 
            done
          done
