# ワークフローの名称
name: Multi-OS E2E Tests

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
concurrency:
  # 同じワークフロー名（Multi-OS E2E Tests）でグループ化
  group: ${{ github.workflow }}-${{ github.ref }}
  # 実行中のジョブをキャンセルせず、順番待ちをさせる
  cancel-in-progress: false

# ワークフローが実行されるトリガーを定義
on:
  # 定期実行 (schedule)
  schedule:
    # 3時間毎に実行 (JST 10:00, 13:00, 16:00, 19:00, 22:00, 翌5:00, 8:00) -> Ubuntu専用にする
    - cron: "0 1,4,7,10,13,20,23 * * *"

    # 毎日JST 深夜3:00 (UTC 18:00) に実行 -> Windows & Mac専用にする
    - cron: "0 18 * * *"

    # UTCの毎日0時0分 (JST 9時) に実行 (Premiumテスト用) GeminiAPIキーの有料化に伴い一時停止
    - cron: "0 0 * * *"
  # 手動実行 (workflow_dispatch)
  workflow_dispatch:
    inputs:
      # 手動実行時に実行するテストスイートを選択するドロップダウン
      test_suite:
        description: "実行するテストスイートを選択"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - premium
          - all
      # 手動実行時に実行するOSを選択するドロップダウン
      os:
        description: "実行するOSを選択"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ubuntu-latest
          - windows-latest
          - macos-latest
      # 手動実行時のワーカー数を指定
      workers:
        description: "実行ワーカー数 (手動用)"
        required: true
        default: "75%"
        type: string

# ワークフローを構成するジョブを定義
jobs:
  # ===================================================================
  # ジョブ 1: 実行するテストのマトリックスとフラグを動的に準備する
  # ===================================================================
  prepare-matrix:
    runs-on: ubuntu-latest
    # このジョブの出力を定義。後続のジョブの条件分岐やマトリックスとして使用。
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_normal: ${{ steps.get_suite.outputs.run_normal }}
      run_premium: ${{ steps.get_suite.outputs.run_premium }}
    steps:
      - name: Determine test matrix
        id: set-matrix
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # 1. 毎日0時のスケジュール（Premiumテスト用など）
            if [[ "${{ github.event.schedule }}" == "0 0 * * *" ]]; then
              echo 'matrix=[{"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"}, {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"}, {"os": "windows-latest", "browser": "chromium", "binary": "chromium"}, {"os": "macos-latest", "browser": "webkit", "binary": "webkit"}, {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}]' >> $GITHUB_OUTPUT
            
            # 2. 3時間毎のスケジュール（JST日中・夕夜間など）：Ubuntuのみを実行して高速フィードバック
            elif [[ "${{ github.event.schedule }}" == "0 1,4,7,10,13,20,23 * * *" ]]; then
              echo 'matrix=[{"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"}, {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"}]' >> $GITHUB_OUTPUT
            
            # 3. 毎日JST深夜3時（UTC 18:00）のスケジュール：負荷の高い Windows と macOS をまとめて実行
            elif [[ "${{ github.event.schedule }}" == "0 18 * * *" ]]; then
              echo 'matrix=[{"os": "windows-latest", "browser": "chromium", "binary": "chromium"}, {"os": "macos-latest", "browser": "webkit", "binary": "webkit"}, {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}]' >> $GITHUB_OUTPUT
            fi
          else
            # 手動実行 (workflow_dispatch)
            OS_INPUT="${{ inputs.os || github.event.inputs.os }}"
            
            if [[ "$OS_INPUT" == "all" ]]; then
              echo 'matrix=[{"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"}, {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"}, {"os": "windows-latest", "browser": "chromium", "binary": "chromium"}, {"os": "macos-latest", "browser": "webkit", "binary": "webkit"}, {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}]' >> $GITHUB_OUTPUT
            elif [[ "$OS_INPUT" == *"ubuntu"* ]]; then
              echo 'matrix=[{"os": "ubuntu-latest", "browser": "chromium", "binary": "chromium"}, {"os": "ubuntu-latest", "browser": "mobile-chrome", "binary": "chromium"}]' >> $GITHUB_OUTPUT
            elif [[ "$OS_INPUT" == *"windows"* ]]; then
              echo 'matrix=[{"os": "windows-latest", "browser": "chromium", "binary": "chromium"}]' >> $GITHUB_OUTPUT
            elif [[ "$OS_INPUT" == *"macos"* ]]; then
              echo 'matrix=[{"os": "macos-latest", "browser": "webkit", "binary": "webkit"}, {"os": "macos-latest", "browser": "mobile-safari", "binary": "webkit"}]' >> $GITHUB_OUTPUT
            fi
          fi

      - name: Determine Test Suite Flags
        id: get_suite
        shell: bash
        run: |
          # 実行すべきスイート（Normal/Premium）をフラグとして出力
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ "${{ github.event.schedule }}" == "0 0 * * *" ]; then
              echo "run_premium=true" >> $GITHUB_OUTPUT
            else
              echo "run_normal=true" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # 旧仕様の event.inputs と新仕様 inputs を両方カバー
            SUITE="${{ inputs.test_suite || github.event.inputs.test_suite }}"
            if [ "$SUITE" == "normal" ] || [ "$SUITE" == "all" ]; then echo "run_normal=true" >> $GITHUB_OUTPUT; fi
            if [ "$SUITE" == "premium" ] || [ "$SUITE" == "all" ]; then echo "run_premium=true" >> $GITHUB_OUTPUT; fi
          fi

  # ===================================================================
  # ジョブ 2: Normalテストの実行
  # ===================================================================
  e2e-normal:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.run_normal == 'true' }}
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      # 最大並列数をPC(Linux,Windows,Mac),Mobile(Android,iOS)の５つ
      max-parallel: 5
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # キャッシュキー接頭辞の設定 (バイナリエンジン単位でキャッシュを共有)
      - name: Set cache key prefix
        run: |
          echo "CACHE_KEY_PREFIX=${{ runner.os }}-playwright-${{ matrix.binary }}-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Ubuntuランナーには日本語フォントがないためインストール (文字化け/トーフ対策)
      # フォントのキャッシュ確認
      - name: Cache Japanese fonts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: ~/.fonts
          key: ${{ runner.os }}-fonts-noto-cjk-v1

      # キャッシュがない場合のみインストールしてユーザーディレクトリにコピー
      - name: Install Japanese fonts (Ubuntu only)
        if:
          matrix.os == 'ubuntu-latest' && steps.cache-fonts.outputs.cache-hit !=
          'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.fonts
          cp -r /usr/share/fonts/opentype/noto ~/.fonts/

      # 復元した(または新規コピーした)フォントをシステムに認識させる
      - name: Refresh font cache (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: fc-cache -fv

      # 日本時間（JST）で日付を取得するように修正
      - name: Get daily cache key suffix
        id: get-date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      # キャッシュから復元された不要なロックファイルを事前に強制削除してハングを防ぐ
      - name: Remove stale Playwright locks
        shell: bash
        run: |
          if [ -d "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" ]; then
            echo "Checking for stale locks in ${{ env.PLAYWRIGHT_BROWSERS_PATH }}..."
            rm -rf "${{ env.PLAYWRIGHT_BROWSERS_PATH }}/__dirlock"
            find "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" -name "__dirlock" -exec rm -rf {} + || true
          fi

      # システム依存関係のインストール (プロンプト停止防止)
      - name: Install Playwright system dependencies
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install-deps ${{ matrix.binary }}
        env:
          DEBIAN_FRONTEND: noninteractive

      # 指定されたバイナリをインストール
      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.binary }}
        env:
          DEBUG: pw:*

      - name: Set OS Short Name
        shell: bash
        run: |
          OS_NAME="${{ matrix.os }}"
          if [[ "$OS_NAME" == "ubuntu-latest" ]];then echo "OS_SHORT_NAME=ubuntu" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "windows-latest" ]]; then echo "OS_SHORT_NAME=win" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "macos-latest" ]]; then echo "OS_SHORT_NAME=macos" >> $GITHUB_ENV;
          else echo "OS_SHORT_NAME=unknown" >> $GITHUB_ENV; fi

      # プロジェクト名を指定してテスト実行
      - name: Run Normal E2E Tests
        id: run_tests
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ "$OS_NAME" = "ubuntu-latest" ]; then
              # 高速なUbuntu環境は高効率な並列実行を維持
              WORKERS="75%"
            else
              # Windows, macOS環境はI/O競合やCPU飽和を防ぐため直列（1ワーカー）で堅実に実行
              WORKERS="1"
            fi
          else
            # 手動実行時は指定された値（未指定時は2）を適用
            WORKERS="${{ github.event.inputs.workers }}"
            WORKERS="${WORKERS:-2}"
          fi

          echo "Running tests on $OS_NAME with workers: $WORKERS"
          npx playwright test tests/specs/normal --project=${{ matrix.browser }} --reporter=line --workers=$WORKERS
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        env:
          TEST_RUN_SUFFIX: ${{ env.OS_SHORT_NAME }}
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_TEST_USER_PREFIX: "pwusr"
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト終了直後に、このランナー(マシン)が汚したワーカーセッションをその場で即座に自活掃除します
      - name: Run Local Cleanup on Finish
        if: always()
        shell: bash
        run: |
          OS_CODE_CHAR="l"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then OS_CODE_CHAR="u"; fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then OS_CODE_CHAR="w"; fi
          if [ "${{ matrix.os }}" = "macos-latest" ]; then OS_CODE_CHAR="m"; fi

          BROWSER_CODE="c"
          if [ "${{ matrix.browser }}" = "firefox" ]; then BROWSER_CODE="f"; fi
          if [ "${{ matrix.browser }}" = "webkit" ]; then BROWSER_CODE="s"; fi
          if [ "${{ matrix.browser }}" = "mobile-chrome" ]; then BROWSER_CODE="a"; fi
          if [ "${{ matrix.browser }}" = "mobile-safari" ]; then BROWSER_CODE="i"; fi

          # ローカルで作成された可能性のあるワーカー番号(0〜3)を走査して確実に掃除
          for worker in 0 1 2 3; do
            export TEST_WORKER_INDEX="$worker"
            export PWAPPY_TEST_CLEANUP_BROWSER_CODE="$BROWSER_CODE"
            export TEST_RUN_SUFFIX="${{ env.OS_SHORT_NAME }}"
            
            SESSION_FILE=".auth/user-${OS_CODE_CHAR}-${BROWSER_CODE}-${worker}.json"
            
            if [ -f "$SESSION_FILE" ] && [ "$(cat "$SESSION_FILE" | tr -d ' ')" != "{}" ]; then
              echo "=== Cleaning up local account: OS[${{ matrix.os }}] Browser[${{ matrix.browser }}] Worker[$worker] ==="
              npx playwright test tests/tools/a0-cleanup-all-apps.spec.ts --project=${{ matrix.browser }} --output=test-results-cleanup
            fi
          done
        env:
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト失敗またはタイムアウト（キャンセル）時：このブラウザエンジン/OSに関連する「全ての古いキャッシュ」を削除する
      - name: Delete cache on failure or cancellation
        if: failure() || cancelled()
        run: |
          echo "Test failed or was cancelled. Clearing all related caches for ${{ env.CACHE_KEY_PREFIX }}..."
          # 一致する接頭辞を持つキャッシュをリストアップして全て削除
          gh cache list --key "${{ env.CACHE_KEY_PREFIX }}-" --json key --jq '.[].key' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name:
            playwright-report-normal-${{ matrix.os }}-${{ matrix.browser }}-${{
            github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark Job Failure
        if: steps.run_tests.outputs.EXIT_CODE != '0'
        run: exit 1

  # ===================================================================
  # ジョブ 3: Premiumテストの実行
  # ===================================================================
  e2e-premium:
    needs: prepare-matrix
    if: ${{ needs.prepare-matrix.outputs.run_premium == 'true' }}
    timeout-minutes: 120
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      # ポイント消費の重複や競合を防ぐため、OS間でも1つずつ順番に実行する。
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/pw-browsers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set cache key prefix
        run: |
          echo "CACHE_KEY_PREFIX=${{ runner.os }}-playwright-${{ matrix.binary }}-${{ hashFiles('**/package-lock.json') }}" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # Ubuntuランナーには日本語フォントがないためインストール (文字化け/トーフ対策)
      - name: Cache Japanese fonts (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: ~/.fonts
          key: ${{ runner.os }}-fonts-noto-cjk-v1

      - name: Install Japanese fonts (Ubuntu only)
        if:
          matrix.os == 'ubuntu-latest' && steps.cache-fonts.outputs.cache-hit !=
          'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.fonts
          cp -r /usr/share/fonts/opentype/noto ~/.fonts/

      - name: Refresh font cache (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: fc-cache -fv

      - name: Get daily cache key suffix
        id: get-date
        run: echo "date=$(TZ=Asia/Tokyo date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ env.CACHE_KEY_PREFIX }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      # キャッシュから復元された不要なロックファイルを事前に強制削除してハングを防ぐ
      - name: Remove stale Playwright locks
        shell: bash
        run: |
          if [ -d "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" ]; then
            echo "Checking for stale locks in ${{ env.PLAYWRIGHT_BROWSERS_PATH }}..."
            rm -rf "${{ env.PLAYWRIGHT_BROWSERS_PATH }}/__dirlock"
            find "${{ env.PLAYWRIGHT_BROWSERS_PATH }}" -name "__dirlock" -exec rm -rf {} + || true
          fi

      - name: Install Playwright system dependencies
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install-deps ${{ matrix.binary }}
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Install Playwright Browsers
        if: steps.cache-playwright-browsers.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.binary }}
        env:
          DEBUG: pw:*

      - name: Set OS Short Name
        shell: bash
        run: |
          OS_NAME="${{ matrix.os }}"
          if [[ "$OS_NAME" == "ubuntu-latest" ]]; then echo "OS_SHORT_NAME=ubuntu" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "windows-latest" ]]; then echo "OS_SHORT_NAME=win" >> $GITHUB_ENV;
          elif [[ "$OS_NAME" == "macos-latest" ]]; then echo "OS_SHORT_NAME=macos" >> $GITHUB_ENV;
          else echo "OS_SHORT_NAME=unknown" >> $GITHUB_ENV; fi

      # テスト実行
      - name: Run Premium E2E Tests
        id: run_tests
        shell: bash
        # 最も安定した直列実行(1ワーカー)で実行。
        run: |
          npx playwright test tests/specs/premium --project=${{ matrix.browser }} --reporter=line --workers=1
          echo "EXIT_CODE=$?" >> $GITHUB_OUTPUT
        env:
          TEST_RUN_SUFFIX: ${{ env.OS_SHORT_NAME }}
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_TEST_USER_PREFIX: "pwusr"
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト終了直後に、このランナー(マシン)が汚したワーカーセッションをその場で即座に自活掃除します
      - name: Run Local Cleanup on Finish
        if: always()
        shell: bash
        run: |
          OS_CODE_CHAR="l"
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then OS_CODE_CHAR="u"; fi
          if [ "${{ matrix.os }}" = "windows-latest" ]; then OS_CODE_CHAR="w"; fi
          if [ "${{ matrix.os }}" = "macos-latest" ]; then OS_CODE_CHAR="m"; fi

          BROWSER_CODE="c"
          if [ "${{ matrix.browser }}" = "firefox" ]; then BROWSER_CODE="f"; fi
          if [ "${{ matrix.browser }}" = "webkit" ]; then BROWSER_CODE="s"; fi
          if [ "${{ matrix.browser }}" = "mobile-chrome" ]; then BROWSER_CODE="a"; fi
          if [ "${{ matrix.browser }}" = "mobile-safari" ]; then BROWSER_CODE="i"; fi

          # ローカルで作成された可能性のあるワーカー番号(0〜3)を走査して確実に掃除
          for worker in 0 1 2 3; do
            export TEST_WORKER_INDEX="$worker"
            export PWAPPY_TEST_CLEANUP_BROWSER_CODE="$BROWSER_CODE"
            export TEST_RUN_SUFFIX="${{ env.OS_SHORT_NAME }}"
            
            SESSION_FILE=".auth/user-${OS_CODE_CHAR}-${BROWSER_CODE}-${worker}.json"
            
            if [ -f "$SESSION_FILE" ] && [ "$(cat "$SESSION_FILE" | tr -d ' ')" != "{}" ]; then
              echo "=== Cleaning up local account: OS[${{ matrix.os }}] Browser[${{ matrix.browser }}] Worker[$worker] ==="
              npx playwright test tests/tools/a0-cleanup-all-apps.spec.ts --project=${{ matrix.browser }} --output=test-results-cleanup
            fi
          done
        env:
          PWAPPY_TEST_BASE_URL: ${{ secrets.PWAPPY_TEST_BASE_URL }}
          PWAPPY_TEST_LOGIN_ENDPOINT: ${{ secrets.PWAPPY_TEST_LOGIN_ENDPOINT }}
          PWAPPY_TEST_LOGIN_PASSCODE: ${{ secrets.PWAPPY_TEST_LOGIN_PASSCODE }}
          PWAPPY_LOGIN: "1"
          TEST_GEMINI_API_KEY: ${{ secrets.TEST_GEMINI_API_KEY }}

      # テスト失敗またはタイムアウト（キャンセル）時：このブラウザエンジン/OSに関連する「全ての古いキャッシュ」を削除する
      - name: Delete cache on failure or cancellation
        if: failure() || cancelled()
        run: |
          echo "Test failed or was cancelled. Clearing all related caches for ${{ env.CACHE_KEY_PREFIX }}..."
          gh cache list --key "${{ env.CACHE_KEY_PREFIX }}-" --json key --jq '.[].key' | xargs -I {} gh cache delete {} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name:
            playwright-report-premium-${{ matrix.os }}-${{ matrix.browser }}-${{
            github.run_id }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Mark Job Failure
        if: steps.run_tests.outputs.EXIT_CODE != '0'
        run: exit 1
